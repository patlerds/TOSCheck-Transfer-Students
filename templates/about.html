    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Markdown content as a string
        const aboutMarkdown = `
The **Legal Document Analyzer** is an AI-powered tool designed to help users quickly understand complex legal documents like Privacy Policies and Terms of Service. By simply providing a URL, the application scrapes the content, analyzes it using advanced language models, and presents key information in a user-friendly format.

## Key Features:
* **Comprehensive Summaries:** Get a concise ten-word summary and a detailed one-paragraph summary of the entire document.
* **Interactive Analysis Modes:**
    * **Simple Mode:** Focus on the most critical aspects, including key points and potential user concerns, presented in an easy-to-digest accordion format.
    * **Advanced Mode:** Dive deeper into specific clauses such as data protection measures, intellectual property rights, dispute resolution, and more, also presented interactively.
    * **TOS Text View:** Access the raw, extracted text of the document for detailed review.
* **Direct Citations:** Every extracted piece of information is backed by direct, verbatim quotes from the original document, ensuring transparency and accuracy.
* **Citation Verification:** The system attempts to verify if the generated citations are truly present in the document's raw text. If a citation cannot be confirmed, a clear disclaimer is provided.
* **Smart Title Extraction:** Automatically infers and enhances document titles, including company names from URLs, to make recent and cached reviews more identifiable.
* **Intelligent Scraping & Manual Input:** Utilizes robust web scraping techniques (including Playwright for dynamic content). If automatic scraping fails, a dedicated input area appears, allowing users to paste the raw HTML content for analysis.
* **Cached Results:** Previously analyzed documents are cached, allowing for instant retrieval and re-analysis without re-scraping.
* **Search Functionality:** Easily search through your cached analysis results by URL, title, or company name.
* **Dark Mode:** A toggle for a comfortable viewing experience in low-light conditions.

## How It Works:
1.  **URL Input:** Paste the URL of a legal document into the input field.
2.  **Web Scraping:** The application attempts to fetch the HTML content. It uses a combination of direct HTTP requests and a headless browser (Playwright) for pages that require JavaScript rendering.
3.  **Text Extraction:** BeautifulSoup is used to parse the HTML and extract the main textual content, filtering out irrelevant elements.
4.  **AI Analysis:** The extracted text is sent to a powerful large language model (Gemini API) which is prompted to identify and extract specific clauses and summarize the document according to predefined criteria.
5.  **Result Presentation:** The AI's analysis is then structured and displayed on the frontend, with interactive elements for easy navigation and understanding.

## API Endpoints:
The Legal Document Analyzer also exposes a few API endpoints for programmatic access to its functionalities.

### Analyze Document
This endpoint allows you to submit a URL for analysis and retrieve the summarized and detailed information.

**Endpoint:** \`/analyze\`
**Method:** \`POST\`
**Request Body:**
\`\`\`json
{
    "url": "https://example.com/terms-of-service"
}
\`\`\`

**Example Response (simplified):**
\`\`\`json
{
    "summary_ten_words": "Concise summary of document's key points.",
    "summary_one_paragraph": "A more detailed summary covering the main aspects.",
    "analysis": {
        "data_protection": [
            {
                "point": "How user data is collected and used.",
                "citation": "Original text from document regarding data."
            }
        ],
        "intellectual_property": [
            {
                "point": "Rights related to content and trademarks.",
                "citation": "Original text from document regarding IP."
            }
        ]
        // ... other analysis categories
    }
}
\`\`\`

### Get Cached Analysis
This endpoint allows you to retrieve a previously cached analysis using its unique ID.

**Endpoint:** \`/cached/<analysis_id>\`
**Method:** \`GET\`

**Example Response (simplified):**
\`\`\`json
{
    "id": "unique_analysis_id_string",
    "url": "https://example.com/terms-of-service",
    "title": "Example Co. - Terms of Service",
    "summary_ten_words": "Concise summary of document's key points.",
    "analysis": {
        // ... analysis data
    }
}
\`\`\`

## Disclaimer:
<span class="text-red-600 dark:text-red-400 font-semibold">The analysis provided by this AI is for informational purposes only and does not constitute legal advice. Always consult with a legal professional for specific legal guidance.</span>
        `;

        // Theme management functions (copy from index.html)
        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/; SameSite=Lax";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('themeIcon').textContent = '🌙';
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('themeIcon').textContent = '☀️';
            }
            setCookie('theme', theme, 30);
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Render Markdown content
            const markdownContainer = document.getElementById('markdown-content');
            // Use marked.js to convert Markdown to HTML
            markdownContainer.innerHTML = marked.parse(aboutMarkdown);

            const savedTheme = getCookie('theme');
            if (savedTheme) {
                applyTheme(savedTheme);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                applyTheme('dark');
            } else {
                applyTheme('light');
            }

            // Set the version text
            const versionTextElement = document.getElementById('versionText');
            fetch('/version')
                .then(response => response.json())
                .then(data => versionTextElement.textContent = data.version);
        });

        document.getElementById('themeToggle').addEventListener('click', () => {
            const currentTheme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
            applyTheme(currentTheme === 'light' ? 'dark' : 'light');
        });
    </script>
