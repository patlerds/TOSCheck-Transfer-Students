        /* Custom scrollbar for better aesthetics */

        html.dark ::-webkit-scrollbar-thumb {

        /* Accordion styles */

        html.dark .accordion-header:hover {

        .accordion-content {
            padding: 0.75rem 1rem; /* p-3 p-4 */
            background-color: #ffffff; /* white */

        html.dark .accordion-content {

        .accordion-icon {

<body class="min-h-screen flex flex-col items-center py-8 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl w-full bg-white shadow-xl rounded-xl p-6 sm:p-8 lg:p-10 relative">
        <!-- Theme Toggle Button -->
        <button id="themeToggle"
            class="absolute top-4 right-4 p-2 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-600 transition duration-150 ease-in-out focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
            <span id="themeIcon">☀️</span>
        </button>

        <a href="/"
            class="block text-center no-underline text-gray-900 hover:text-blue-700 dark:text-gray-100 dark:hover:text-blue-500 transition duration-150 ease-in-out">
            <h1 class="text-3xl sm:text-4xl font-bold mb-6">Changelog</h1>
        </a>
        <!-- Navigation Links -->
        <nav class="mb-8 flex justify-center space-x-8">
            <div class="relative pb-2">
                <a href="/" class="text-gray-600 dark:text-gray-300 font-semibold text-lg hover:text-gray-800 dark:hover:text-gray-100">Home</a>
            </div>
            <div class="relative pb-2">
                <a href="/search" class="text-gray-600 dark:text-gray-300 font-semibold text-lg hover:text-gray-800 dark:hover:text-gray-100">Search Cached</a>
            </div>
            <div class="relative pb-2">
                <a href="/about" class="text-gray-600 dark:text-gray-300 font-semibold text-lg hover:text-gray-800 dark:hover:text-gray-100">About</a>
            </div>
            <div class="relative pb-2">
                <a href="/changelog" class="text-blue-500 dark:text-blue-400 font-semibold text-lg hover:text-blue-700 dark:hover:text-blue-300">Changelog</a>
                <div class="absolute bottom-0 left-0 w-full h-0.5 bg-blue-500 dark:bg-blue-400"></div>
            </div>
            <div class="relative pb-2">
                <a href="/batch" class="text-gray-600 dark:text-gray-300 font-semibold text-lg hover:text-gray-800 dark:hover:text-gray-100">Batch Upload</a>
            </div>
        </nav>

        <div id="changelogContent" class="text-gray-700 dark:text-gray-300 leading-relaxed space-y-3">
            <!-- Changelog entries will be dynamically loaded here -->
        </div>

        <div class="text-center text-gray-500 dark:text-gray-400 text-sm mt-8 border-t pt-4 dark:border-gray-600">
            <p>App Version: <span id="versionText"></span></p>
            <p class="mt-2">Disclaimer: The information on this page is for informational purposes only and may not be exhaustive.</p>
            <p class="mt-2">
                <a href="https://docs.google.com/forms/d/e/1FAIpQLScd95HsHPg4O2tZRlwBmZcuhsdIXNIVzOBIAjfuHWsnX45DaA/viewform?usp=dialog" target="_blank" class="text-blue-500 hover:underline dark:text-blue-400">
                    Provide Feedback
                </a>
            </p>
        </div>
    </div>

    <script>
        // Theme management functions (copy from index.html)
        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/; SameSite=Lax";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('themeIcon').textContent = '🌙';
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('themeIcon').textContent = '☀️';
            }
            setCookie('theme', theme, 30);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = getCookie('theme');
            if (savedTheme) {
                applyTheme(savedTheme);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                applyTheme('dark');
            } else {
                applyTheme('light');
            }

            const changelogContent = document.getElementById('changelogContent');
            const versionText = document.getElementById('versionText');
            // Dynamically fetch the current app version from the backend
            let currentAppVersion = "Unknown"; 
            fetch('/version')
                .then(response => response.json())
                .then(data => {
                    currentAppVersion = data.version;
                    versionText.textContent = currentAppVersion;
                    renderChangelog(currentAppVersion); // Render changelog after getting version
                })
                .catch(error => {
                    console.error('Error fetching app version:', error);
                    versionText.textContent = "Error";
                    renderChangelog(currentAppVersion); // Render with default if fetch fails
                });

            function renderChangelog(appVersion) {
                const changes = {
                    "2.3.1": [
                        "2026/5/13: **Fix: Auto-run Transfer Eligibility pre-warms cache instead of switching tabs:** Auto-run now calls `prefetchEligibility()` in the background so the main analysis view stays visible. When you click Transfer Eligibility manually, results appear instantly.",
                        "2026/5/13: **Fix: Transfer Eligibility Only mode confirmed stable:** The eligibility-only flow (toggle + PDF upload + auto-run) is fully tested and working as intended."
                    ],
                    "2.3.0": [
                        "2026/5/13: **Feature: Transfer Eligibility Only on Batch Page:** The batch upload page now has the same Eligibility Only toggle as the main page. When enabled, each PDF is analyzed exclusively for transfer student barriers and tenure requirements, skipping the full TOS analysis.",
                        "2026/5/13: **Fix: Transfer Eligibility Only toggle respected for cached documents:** Previously, re-analyzing a cached URL or PDF with the toggle ON would still return the full analysis from cache. The backend now bypasses the full-analysis cache for eligibility-only requests, using the cached `raw.txt` or `eligibility.json` directly."
                    ],
                    "2.2.0": [
                        "2026/5/11: **Feature: Transfer Eligibility Only Mode:** New toggle on the main page lets you skip the full comprehensive analysis and run only the Transfer Eligibility Check.",
                        "2026/5/11: **Feature: Duplicate PDF Filename Detection:** Uploading a PDF whose filename matches an already-cached (but different) file now shows a conflict modal. You can view the existing result instantly or proceed with a fresh analysis.",
                        "2026/5/11: **Fix: Auto-run Transfer Eligibility Check now visible:** The auto-run toggle now switches to the Transfer Eligibility tab immediately on completion, instead of silently pre-fetching in the background.",
                        "2026/5/11: **Fix: Transfer Eligibility results now cached:** Eligibility results are saved to `eligibility.json` in the cache directory. Re-clicking the Transfer Eligibility tab or toggling auto-run no longer re-calls the Gemini API.",
                        "2026/5/11: **Fix: Auto-run toggle persists across pages:** The Auto-run Transfer Eligibility Check toggle state is now saved to localStorage and restored consistently across the Home, Batch, and Search pages."
                    ],
                    "2.1.0": [
                        "2026/5/11: **Feature: Batch PDF Upload:** New /batch page lets you drop up to 10 PDFs at once. Each file is queued and analyzed sequentially (one at a time) to avoid API rate limits. Completed results are clickable and open the full analysis. Past uploads persist from cache.",
                        "2026/5/11: **Feature: Auto Transfer Eligibility Check in Batch:** Toggle on the batch page to automatically run the eligibility check on each PDF as it completes, pre-warming the cache so results appear instantly when you click through.",
                        "2026/5/11: **Feature: Gemini Model Fallback:** When the primary Gemini model hits a rate limit (429) or is unavailable (404), the app automatically retries with the next model in a configurable priority list. Currently falls back to gemini-2.5-flash."
                    ],
                    "2.0.2": [
                        "2026/5/11: **Cleanup: Removed unused imports:** Removed `asyncio` and `threading` imports that were never used, reducing startup overhead.",
                        "2026/5/11: **Cleanup: Simplified `get_gemini_api_key`:** Removed an unreachable `if GEMINI_API_KEY: break` guard and a redundant double-check, making the function's control flow clear.",
                        "2026/5/11: **Cleanup: Removed dead parameter:** The `used_raw_html_for_analysis` parameter was removed from `analyze_document_task`'s signature — it was already recomputed inside the function and the external value was never used.",
                        "2026/5/11: **Cleanup: Simplified relevance gate:** The three-line `is_irrelevant` assignment was collapsed into a single readable expression.",
                        "2026/5/11: **Cleanup: Added LLM gate comments:** Added Gate 1 / Gate 2 explanatory comments above the scrape quality and title relevance checks so the logic is easier to follow."
                    ],
                    "2.0.1": [
                        "2026/5/11: **Fix: Duplicate prompt text:** Every Gemini API call was sending \"Document Text:\" twice in the prompt, potentially confusing the model. Removed the duplicate.",
                        "2026/5/11: **Fix: Duplicate relevance keyword:** The word \"agreement\" appeared twice in the title relevance keyword list. Removed the duplicate.",
                        "2026/5/11: **Fix: Stale parameter in GET analysis:** The `used_raw_html_for_analysis` flag was passed as a stale value from the GET endpoint into the analysis task, where it is already recomputed internally. Removed the redundant argument.",
                        "2026/5/11: **Fix: Wrong variable in corrupted cache handling:** Search Cached was referencing an undefined variable `url_hash` instead of the loop variable `url_hash_dir` when handling unreadable cache entries, causing silent errors.",
                        "2026/5/11: **Fix: Polling timer race condition:** Starting a new analysis while a previous poll timer was still running could cause the old timer to fire against the new job ID. The timer and current job ID are now explicitly cleared before each new analysis."
                    ],
                    "2.0.0": [
                        "2026/5/11: **PDF Upload Support:** Users can now upload PDF files directly for analysis. Text is extracted using pdfplumber and fed into the existing Gemini analysis pipeline. Supports files up to 10 MB.",
                        "2026/5/11: **Eligibility Check:** New dedicated analysis button scans documents for tenure requirements for leadership positions and policies that disadvantage transfer students (students enrolling at junior year or later). Results include severity ratings (Mild / Moderate / Severe) and direct citations.",
                        "2026/5/11: **Cache Delete:** Cached analyses can now be deleted individually. Hover over any entry in Recent Reviews or Search Cached to reveal an × button for one-click removal.",
                        "2026/5/11: **Persistent Job Status:** Analysis status and results now fall back to the cache file when not found in memory, so results survive server restarts without returning errors.",
                        "2026/5/11: **PDF Cached Reviews:** Cached PDF analyses now load correctly from the Recent Reviews list without triggering URL validation errors."
                    ],
                    "1.0.1.22": [
                        "2026/2/2: **Model Upgrade:** Upgraded to Gemini 3.0 Flash Preview for improved analysis capabilities.",
                        "2026/2/2: **Enhanced Relevance Checking:** Added more keywords (e.g., 'policies', 'EULA', 'act') to better identify relevant legal documents."
                    ],

                    "1.0.1.21": [
                        "2025/7/20: **Explicit CORS Configuration:** Configured Cross-Origin Resource Sharing (CORS) for enhanced security.",
                        "2025/7/20: **Google Analytics Integration:** Integrated Google Analytics for better usage insights.",
                        "2025/7/20: **'Provide Feedback' Link:** Added a 'Provide Feedback' link for user suggestions.",
                        "2025/7/20: **Improved Search Result Statuses:** Enhanced search result statuses with 'outdated', 'broken', and 'irrelevant' flags and tooltips for more context."
                    ],
                    "1.0.1.20": [
                        "2025/7/18: **Relevance Check Now Title-Only:** The system now determines whether a document is relevant (i.e., a legal policy) based solely on the document's title, ignoring the content/body for this check. This reduces false positives for non-policy pages.",
                        "2025/7/18: **Summary Placement Improved:** In the analysis results (Simple Mode), the summary now appears at the bottom, with key points and user concerns displayed above it for better readability.",
                        "2025/7/18: **Raw HTML Handling in API Test:** The API test script (`apptest2.py`) now reads and submits raw HTML directly from the `document_raw_html` field in `contracts.json`, rather than reading from `html.txt` files. This ensures more accurate and consistent testing.",
                        "2025/7/18: **Contracts JSON Structure:** The `contracts.json` file now includes the raw HTML (`document_raw_html`) for each entry, making it easier to serve and test HTML content programmatically.",
                        "2025/7/18: **Minor UI and Code Cleanups:** Various minor improvements and bug fixes across the UI and backend, including improved error handling and more robust cache population."
                    ],
                    "1.0.1.17": [
                        "2025/7/14: **Data Logging Improvement:** Switched from `contracts.csv` to `contracts.json` for logging analyzed URLs. This new JSON file now records: `company_name`, `company_url`, `document_title`, and `manual_html_provided` (boolean). Existing entries for the same URL are now overwritten, preventing duplicates.",
                        "2025/7/14: **Enhanced Title Extraction:** Implemented more robust logic to extract and infer company names from URLs, and to prepend them to generic document titles (e.g., 'Terms of Service' becomes 'Perplexity AI Terms of Service').",
                        "2025/7/14: **Dynamic Raw HTML Input:** The raw HTML input textarea is now initially hidden and only appears when automatic web scraping fails. It pre-fills with the problematic content, allowing users to manually correct and re-analyze. It is fully writable and clears/hides on successful analysis."
                    ],
                    "1.0.1.16": [ 
                        "2025/7/13: **Enhanced Analysis Display (Simple Mode):** Key Points and User Concerns sections now use an interactive accordion-style display. Citations for each point are initially hidden and revealed upon clicking the point, providing a cleaner and more interactive user interface.",
                        "2025/7/13: **Enhanced Analysis Display (Advanced Mode):** 'Prohibited Actions (User Conduct)', 'Reasons for Service Termination/Suspension', 'Data Protection Measures', and 'Privacy Protections & User Rights' sections now use an interactive accordion-style display. The main content of these sections is visible by default, with only the citations hidden and revealed upon clicking. 'Dispute Resolution & Governing Law', 'Limitation of Liability', 'Intellectual Property Rights', and 'Changes to Terms' sections also adopted the accordion style, with main details visible and citations hidden until clicked.",
                        "2025/7/13: **Improved Citation Verification:** The system now attempts to verify if generated citations are present in the raw document text. If a citation cannot be confirmed in the document, a disclaimer is displayed next to it, indicating potential discrepancies.",
                        "2025/7/13: **New 'TOS Text' View:** Added a new tab in the analysis results to display the complete raw text of the analyzed Terms of Service or Privacy Policy document.",
                        "2025/7/13: **Updated About Page:** The 'About' page has been revised to reflect all the new features and improvements in the application, including details on the interactive display modes and citation verification."
                    ]
                };

                // Sort versions in descending order
                const sortedVersions = Object.keys(changes).sort((a, b) => {
                    const versionA = a.split('.').map(Number);
                    const versionB = b.split('.').map(Number);
                    for (let i = 0; i < Math.max(versionA.length, versionB.length); i++) {
                        const numA = versionA[i] || 0;
                        const numB = versionB[i] || 0;
                        if (numA > numB) return -1;
                        if (numA < numB) return 1;
                    }
                    return 0;
                });

                changelogContent.innerHTML = ''; // Clear existing content before rendering

                sortedVersions.forEach(version => {
                    const accordionItem = document.createElement('div');
                    accordionItem.classList.add('accordion-item');

                    const header = document.createElement('div');
                    header.classList.add('accordion-header');
                    header.innerHTML = `
                        <span class="text-xl font-bold text-gray-800 dark:text-gray-100">Version ${version} Updates</span>
                        <span class="accordion-icon">▶</span>
                    `;
                    accordionItem.appendChild(header);

                    const content = document.createElement('div');
                    content.classList.add('accordion-content', 'hidden'); // Ensure content starts hidden
                    const ul = document.createElement('ul');
                    ul.classList.add('list-disc', 'list-inside', 'space-y-2');
                    changes[version].forEach(change => {
                        const li = document.createElement('li');
                        li.innerHTML = marked.parseInline(change); // Use marked.parseInline for markdown within list items
                        ul.appendChild(li);
                    });
                    content.appendChild(ul);
                    accordionItem.appendChild(content);

                    header.addEventListener('click', () => {
                        // Toggle the 'active' class on the header
                        header.classList.toggle('active');
                        // Toggle the 'hidden' class on the content
                        content.classList.toggle('hidden');
                    });
                    changelogContent.appendChild(accordionItem);
                });
            }
        });

        document.getElementById('themeToggle').addEventListener('click', () => {
            const currentTheme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
            applyTheme(currentTheme === 'light' ? 'dark' : 'light');
        });
    </script>
</body>
